<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to Wiki-Games — design demo page for PBL.">
    <title>Wiki-Games Log-in</title>
    <link rel="stylesheet" href="sign_in.css">
    <link rel="icon" href="img/light.png">
</head>
<body>
    <header>
        <table>
            <tr>
                <th rowspan="2" style="width: 100px;"><img class="dashcon" src="img/light.png" alt="icon"></th>
                <th colspan="3"><h1 class="name">Wiki-Games</h1></th>
                <th style="width: 100px;"><a href="sign_in.html"><img class="account" src="img/acc.png" alt="account"></a></th>
            </tr>
            <tr style="color: white;" class="dashlink">
                <td style="color: white; width: 33.33%; height: 30px;">
                        <a href="index.html" style="margin: auto;">Home</a>
                </td>
                <td style="width: 33.33%; height: 30px;">
                    <a href="categories.html" style="margin: auto;">Categories</a>
                </td>
                <td style="width: 33.33%; height: 30px;">
                    <a href="about_us.html" style="margin: auto;">About Us</a>
                </td>
                <td bgcolor="#333333">
                    <a style="margin: 30px;" href="sign_in.html">Login</a>
                </td>
            </tr>
        </table>
    </header>

    <br><br><br><br><br><br><br>
    <form action="index.html">
        <div class="loginbox">
            <h2>Log in</h2>

            <label for="username">Username</label>
            <input type="email" name="username" id="username" placeholder="Your username"><br><br>
 
            <label for="E_Mail">E-mail address</label>
            <input type="email" name="E-mail " id="E_Mail" placeholder="you@gmail.com" style="margin-right: 10px;"><br><br>
 
            <label for="psw">Password</label>
            <input type="password" name="Password " id="psw" placeholder="Your password"><br><br>

            <label><input type="checkbox" id="Remember"> Remember me</label><br><br>

            <input type="submit" value="Log in"><br>
            <p>Don't have an account? <a href="sign_up.html" target="_top">Sign-Up!</a></p>

            <div class="logo">
                <img src="img/light.png" alt="logo" width="120px">
            </div>
        </div>
    </form>
 
    <br><br><br><br><br><br><br>
    <footer>
        <table>
            <tr>
                <td>
                    <p>© Copyright 2025. All rights reserved. Developed by Wiki-Games.</p>
                </td>
            </tr>
        </table>
    </footer>
</body>
</html>
